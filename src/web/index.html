<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Energy Dashboard</title>
    <script src="https://cdn.jsdelvr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 30px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        select, button {
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1e2130;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        button {
            background: #3b82f6;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #2563eb; }

        .chart-container {
            background: #1e2130;
            border-radius: 16px;
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-card {
            background: #1e2130;
            border-radius: 12px;
            padding: 20px 30px;
            text-align: center;
            flex: 1;
            min-width: 180px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .stat-card .label { color: #888; font-size: 0.85rem; margin-bottom: 8px; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
        .renewables { color: #22c55e; }
        .fossil     { color: #f97316; }
        .nuclear    { color: #a78bfa; }

        #status {
            text-align: center;
            color: #888;
            margin: 20px 0;
            font-size: 0.9rem;
        }
    </style>
