<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Energy Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 30px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        select, button {
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1e2130;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        button {
            background: #3b82f6;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #2563eb; }

        .chart-container {
            background: #1e2130;
            border-radius: 16px;
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-card {
            background: #1e2130;
            border-radius: 12px;
            padding: 20px 30px;
            text-align: center;
            flex: 1;
            min-width: 180px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .stat-card .label { color: #888; font-size: 0.85rem; margin-bottom: 8px; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
        .renewables { color: #22c55e; }
        .fossil     { color: #f97316; }
        .nuclear    { color: #a78bfa; }

        #status {
            text-align: center;
            color: #888;
            margin: 20px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Global Energy Dashboard</h1>
    <p class="subtitle">Electricity generation by source - data from Our World in Data</p>
    <div class="controls">
        <select id="countrySelect">
            <option value="United States">United States</option>
            <option value="Canada">Canada</option>
            <option value="China">China</option>
            <option value="Germany">Germany</option>
            <option value="France">France</option>
            <option value="India">India</option>
            <option value="United Kingdom">United Kingdom</option>
            <option value="Brazil">Brazil</option>
            <option value="Japan">Japan</option>
            <option value="Australia">Australia</option>
        </select>
        <button onclick="loadData()">Load</button>
    </div>

    <p id="status">Loading</p>
    <div class="chart-container">
        <canvas id="energyChart" height="120"></canvas>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="label">Latest Renewables (TWh)</div>
            <div class="value renewables" id="statRenewables">-</div>
        </div>
        <div class="stat-card">
            <div class="label">Latest Fossil (TWh)</div>
            <div class="value fossil" id="statFossil">-</div>
        </div>
        <div class="stat-card">
            <div class="label">Latest Nuclear (TWh)</div>
            <div class="value nuclear" id="statNuclear">-</div>
        </div>
        <div class="stat-card">
            <div class="label">Nuclear Share</div>
            <div class="value nuclear" id="nuclearShare">-</div>
        </div>
    </div>
    <div class="controls" style="margin-top: 16px;">
        <select id="typeSelect">
            <option value="nuclear">Nuclear</option>
            <option value="renewables">Renewables</option>
            <option value="fossil">Fossil</option>
        </select>
        <input id="yearInput" type="number" value="2023" min="1985" max="2024"
               style="width:90px; padding:10px; border-radius:8px; border:1px solid #333;
                      background:#1e2130; color:#fff; font-size:1rem;">
        <button onclick="loadCompare()">Compare Countries</button>
    </div>
    <div class="chart-container" style="margin-top: 30px;">
        <canvas id="compareChart" height="120"></canvas>
    </div>
    <script>
        let chart = null
        async function loadData() {
            const country = document.getElementById('countrySelect').value;
            document.getElementById('status').textContent = 'Fetching data';
            
            try {
                const response = await fetch(
                    `http://localhost:8080/energyapi/energy?country=${encodeURIComponent(country)}`
                );
                const data = await response.json();

                if (data.error) {
                    document.getElementById('status').textContent =
                        'Error: ' + data.error;
                    return;
                }

                document.getElementById('status').textContent = 
                    `Showing ${data.length} years of data for ${country}`;
                const labels = data.map(d => d.year ?? 0);
                const renewables = data.map(d => d.renewables);
                const fossil = data.map(d => d.fossil ?? 0);
                const nuclear = data.map(d => d.nuclear ?? 0);

                const last = data[data.length - 1];
                const first = data[0];
                document.getElementById('statRenewables').textContent = 
                    (last.renewables ?? 0).toFixed(1);
                document.getElementById('statFossil').textContent = 
                    (last.fossil ?? 0).toFixed(1);
                document.getElementById('statNuclear').textContent =
                    (last.nuclear ?? 0).toFixed(1);
                const totalLatest = last.renewables +
                                    last.fossil + last.nuclear;
                const nuclearShare = 
                    ((last.nuclear / totalLatest) * 100).toFixed(2);
                document.getElementById('nuclearShare').textContent =
                    `${nuclearShare}%`;

                if (chart) chart.destroy();
                const ctx =
                    document.getElementById('energyChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels, // x-axis of years
                        datasets: [
                            {
                                label: 'Renewables (TWh)',
                                data: renewables,
                                borderColor: '#22c55e',
                                backgroundColor: 'rgba(34,197,94,0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 2
                            },
                            {
                                label: 'Fossil (TWh)',
                                data: fossil,
                                borderColor: '#f97316',
                                backgroundColor: 'rgba(249,115,22,0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 2
                            },
                            {
                                label: 'Nuclear (TWh)',
                                data: nuclear,
                                borderColor: '#a78bfa',
                                backgroundColor: 'rgba(167,139,250,0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 2
                            }
                        ]
                    },
                    options: { 
                        responsive: true,
                        plugins: {
                            legend: { labels: {color: '#ccc'} },
                            title: {
                                display: true,
                                text: `Energy Mix -- ${country}`,
                                color: '#fff',
                                font: { size: 16 }
                            }
                        },
                        scales: {
                            x: { 
                                ticks: { color: '#888' },
                                grid: { color: '#2a2a3a' } 
                            },
                            y: {
                                ticks: { color: '#888' },
                                grid: { color: '#2a2a3a' },
                                title: { display: true, text: 'TWh', color:'#888' }
                            }
                        }
                    }
                });
            } catch (error) {
                document.getElementById('status').textContent =
                    'Failed to fetch: ' + error.message;
            }
        }
        async function loadCompare() {
            const type = document.getElementById('typeSelect').value;
            const year = document.getElementById('yearInput').value;

            try {
                const response = await fetch(
                    `http://localhost:8080/energyapi/compare?type=${type}&year=${year}`
                );
                const data = await response.json();
                const labels = data.map(d => d.country);
                const values = data.map(d => d.value);
            }

        }
        // Load the default (US) so they see graph right away
        loadData();
    </script>
</body>
</html>
